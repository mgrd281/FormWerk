# Force GitHub: Show "Open with Xcode" button in Code dropdown
# 
# GitHub shows this button ONLY when:
# 1. .xcodeproj/.xcworkspace exists ✅ (we have it)
# 2. Swift/ObjC is a PRIMARY language (not generated) ❌ (Dart dominates)
#
# Solution: Mark ALL Dart as documentation, keep Swift as real code

overrides:
  # === DEMOTE DART (Flutter code) ===
  # Treat all Dart as documentation so it doesn't count toward language %
  "**/*.dart":
    linguist-documentation: true
  
  # === PROMOTE SWIFT / OBJ-C (iOS native code) ===  
  "ios/**":
    linguist-generated: false
    linguist-vendored: false
    linguist-documentation: false
    linguist-detectable: true
  "ios/**/*.swift":
    linguist-language: Swift
    linguist-generated: false
  "ios/**/*.h":
    linguist-language: Objective-C
    linguist-generated: false
  "ios/**/*.m":
    linguist-language: Objective-C
    linguist-generated: false
    
  # Hide generated/vendored files
  ".flutter-plugins":
    linguist-generated: true
  ".flutter-plugins-dependencies":
    linguist-generated: true
  "pubspec.lock":
    linguist-generated: true
  "android/**/*.kt":
    linguist-documentation: true
  "android/**/*.java":
    linguist-documentation: true