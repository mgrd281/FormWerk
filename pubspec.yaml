name: gewichtskompass
description: Premium weight management and wellness app – GewichtsKompass
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  equatable: ^2.0.5

  # Routing
  go_router: ^17.2.0

  # Firebase - Disabled until real credentials are configured
  # To enable: uncomment these, add GoogleService-Info.plist, and configure Firebase
  # firebase_core: ^4.0.0
  # firebase_auth: ^6.0.0
  # cloud_firestore: ^6.0.0
  # firebase_analytics: ^12.0.0
  # firebase_crashlytics: ^5.0.0
  # firebase_messaging: ^16.0.0

  # Auth Providers - Disabled (requires Firebase)
  # google_sign_in: ^7.2.0
  # sign_in_with_apple: ^7.0.1
  # crypto: ^3.0.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Design
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.0.2
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  image_picker: ^1.0.7
  share_plus: ^13.0.0
  url_launcher: ^6.2.4
  package_info_plus: ^10.0.0
  connectivity_plus: ^7.1.1
  table_calendar: ^3.0.9
  smooth_page_indicator: ^2.0.1
  animate_do: ^4.2.0
  flutter_slidable: ^4.0.3

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true


